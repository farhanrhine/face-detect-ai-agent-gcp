version: 2.1

executors:
  docker-executor:
    machine:
      image: ubuntu-2204:current
    working_directory: ~/repo

jobs:
  checkout_code:
    executor: docker-executor
    steps:
      - checkout

  build_docker_image:
    executor: docker-executor
    steps:
      - checkout
      - run:
          name: Install Google Cloud SDK
          command: |
            if ! command -v gcloud &> /dev/null; then
              curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts
              echo 'source ~/google-cloud-sdk/path.bash.inc' >> $BASH_ENV
              source ~/google-cloud-sdk/path.bash.inc
            fi
      - run:
          name: Authenticate with Google Cloud
          command: |
            echo "$GCLOUD_SERVICE_KEY" > gcp-key.json
            gcloud auth activate-service-account --key-file=gcp-key.json
            gcloud auth configure-docker us-central1-docker.pkg.dev || gcloud auth configure-docker
      - run:
          name: Build and Push Image
          command: |
            docker build -t us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/face-detection-ai-agent/face-detect-ai-agent:latest .
            docker push us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/face-detection-ai-agent/face-detect-ai-agent:latest

  deploy_to_gke:
    executor: docker-executor
    steps:
      - checkout
      - run:
          name: Install Google Cloud SDK
          command: |
            if ! command -v gcloud &> /dev/null; then
              curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts
              echo 'source ~/google-cloud-sdk/path.bash.inc' >> $BASH_ENV
              source ~/google-cloud-sdk/path.bash.inc
            fi
      - run:
          name: Authenticate with Google Cloud
          command: |
            echo "$GCLOUD_SERVICE_KEY" > gcp-key.json
            gcloud auth activate-service-account --key-file=gcp-key.json
            gcloud auth configure-docker us-central1-docker.pkg.dev || gcloud auth configure-docker
      - run:
          name: Configure GKE
          command: |
            gcloud container clusters get-credentials $GKE_CLUSTER --region $GOOGLE_COMPUTE_REGION --project $GOOGLE_PROJECT_ID
      - run:
          name: Deploy to GKE
          command: |
            kubectl apply -f kubernetes-deployment.yaml --validate=false
            kubectl rollout restart deployment face-detect-ai-agent-app

workflows:
  version: 2
  deploy_pipeline:
    jobs:
      - checkout_code
      - build_docker_image:
          requires:
            - checkout_code
      - deploy_to_gke:
          requires:
            - build_docker_image
